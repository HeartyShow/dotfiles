# Television channel for worktrunk worktree branches
# Used via tmux prefix+g to open a worktree branch in a new tmux window
#
# Two sources (cycle with <C-s>):
#   1. Existing worktrees (default)
#   2. All local + remote branches (for branches without a worktree yet)
#
# <Enter> works from both: ensures the worktree exists, then opens a tmux window.

[metadata]
name = "wt-branches"
description = "Open a worktree branch in a new tmux window"
requirements = ["wt", "git", "jq"]

[source]
command = [
  # Default: existing worktrees (branch names only)
  "wt list --format=json 2>/dev/null | jq -r '.[].branch' || echo 'No worktrees'",
  # Alt: all local + remote branches (fetches first to stay current)
  "git fetch --prune origin >/dev/null 2>&1; git branch --all --format='%(refname:short)' | sed 's|^origin/||' | sort -u",
]

[preview]
command = "git log --oneline --graph --color=always -20 '{}' 2>/dev/null"

[ui]
input_header = " Worktree Branches"

[keybindings]
enter = "actions:open"
ctrl-g = "actions:create"
ctrl-d = "actions:remove"
ctrl-r = "reload_source"

[actions.open]
description = "Open worktree in new tmux window"
command = "sh ~/.dotfiles/television/.config/television/scripts/wt-open.sh '{}'"
mode = "execute"

[actions.create]
description = "Create new branch from selected base"
command = "sh ~/.dotfiles/television/.config/television/scripts/wt-create.sh '{}'"
mode = "execute"

[actions.remove]
description = "Remove worktree"
command = "wt remove '{}'"
mode = "execute"
