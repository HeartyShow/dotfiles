[default_session]
startup_command = "tmux rename-window \"$(basename {})\" && tmux set-option -w automatic-rename off && tmux split-window -v -c {} -l 25% && tmux select-pane -t 1 && tmux resize-pane -Z && nvim"
preview_command = "eza --all --git --icons --color=always {}"

[[session]]
name = "Dotfiles"
path = "~/.dotfiles"

[[session]]
name = "Downloads"
path = "~/Downloads"

[[session]]
name = "Obsidian"
startup_command = "nvim"
path = "~/vaults"
